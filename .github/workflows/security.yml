name: Security Gates

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '24 4 * * 1'

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-security:
    name: Static Security
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install workflow security tools
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          python -m pip install --user zizmor==1.24.1
          echo "$HOME/go/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Workflow syntax lint
        run: actionlint

      - name: Workflow security lint
        run: zizmor --offline --min-severity low .github/workflows

      - name: Secret scan
        run: gitleaks detect --source . --no-git --redact --verbose

      - name: Dependency audit
        run: pnpm audit --audit-level moderate

      - name: License and SPDX policy
        run: pnpm run check:licenses

      - name: Filesystem scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: fs
          scan-ref: .
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  container-security:
    name: Container Security
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t mcp-infra-lens:security .

      - name: Container scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: mcp-infra-lens:security
          severity: MEDIUM,HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  scorecard:
    name: OSSF Scorecard
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a
        with:
          results_file: scorecard.sarif
          results_format: sarif
          publish_results: false

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@68bde559dea0fdcac2102bfdf6230c5f70eb485e
        with:
          sarif_file: scorecard.sarif
