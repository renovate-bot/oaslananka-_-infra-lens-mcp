name: Release

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
      issues: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish npm Package
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    environment: npm-production
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: Prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.3.0 --activate

      - name: Use Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release version is unpublished
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          if npm view "mcp-infra-lens@${VERSION}" version >/dev/null 2>&1; then
            echo "mcp-infra-lens@${VERSION} already exists on npm" >&2
            exit 1
          fi

      - name: Test and build
        run: |
          pnpm run format:check
          pnpm run lint
          pnpm run test:coverage
          pnpm run build
          pnpm run check:licenses

      - name: Metadata check
        run: pnpm run check:metadata
        env:
          CHECK_METADATA_REQUIRE_DIST: 'true'

      - name: Pack package
        id: pack
        run: |
          TARBALL="$(npm pack --json | node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => console.log(JSON.parse(data)[0].filename));")"
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: node scripts/generate-sbom.mjs "mcp-infra-lens-${{ needs.release-please.outputs.version }}.cdx.json"

      - name: Generate SHA256 checksum
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: sha256sum "$TARBALL" "mcp-infra-lens-${{ needs.release-please.outputs.version }}.cdx.json" > "mcp-infra-lens-${{ needs.release-please.outputs.version }}.sha256"

      - name: Attest package artifact
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: ${{ steps.pack.outputs.tarball }}

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TARBALL: ${{ steps.pack.outputs.tarball }}
          TAG_NAME: ${{ needs.release-please.outputs.tag_name }}
          VERSION: ${{ needs.release-please.outputs.version }}
        run: gh release upload "$TAG_NAME" "$TARBALL" "mcp-infra-lens-${VERSION}.cdx.json" "mcp-infra-lens-${VERSION}.sha256"

      - name: Publish with npm trusted publishing
        env:
          TARBALL: ${{ steps.pack.outputs.tarball }}
        run: npm publish "$TARBALL" --access public

      - name: Post-publish smoke
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          TMPDIR="$(mktemp -d)"
          cd "$TMPDIR"
          npm init -y >/dev/null
          npm install "mcp-infra-lens@${VERSION}"
          node -e 'import("mcp-infra-lens").then(() => console.log("import ok"))'
