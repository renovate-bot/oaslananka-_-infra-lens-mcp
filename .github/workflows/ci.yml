name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick Gates
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Use Node.js 24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

      - name: Lint and typecheck
        run: pnpm run lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm run build

      - name: MCP metadata check
        run: pnpm run check:metadata
        env:
          CHECK_METADATA_REQUIRE_DIST: 'true'

      - name: Package dry run
        run: npm pack --dry-run

  full:
    name: Full Gates Node ${{ matrix.node-version }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Prepare pnpm
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Coverage tests
        run: pnpm run test:coverage

      - name: Build
        run: pnpm run build

      - name: Package dry run
        run: npm pack --dry-run

  docker:
    name: Docker Build Smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          persist-credentials: false

      - name: Build image
        run: docker build -t mcp-infra-lens:ci .

      - name: CLI smoke
        run: docker run --rm --entrypoint node mcp-infra-lens:ci -e "import('better-sqlite3').then(() => console.log('runtime ok'))"
