name: Publish GHCR Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build.
        type: string
        default: main
      push_image:
        description: Push image to GHCR. Default is build-only validation.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: publish-ghcr-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write # required to push images to GitHub Container Registry
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Read package version
        id: pkg
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          name=$(node -p "require('./package.json').name")
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: ${{ github.event_name == 'release' || inputs.push_image == true }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@8e5442c4ef9f78752691e2d8f8d19755c6f78e81 # v5.5.1
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.pkg.outputs.version }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=ref,event=tag

      - name: Build or push image
        uses: docker/build-push-action@471d1dc4e07e5cdedd4c2171150001c434f0b7a4 # v6.15.0
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'release' || inputs.push_image == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true

      - name: Summarize image
        run: |
          set -euo pipefail
          echo "Image: ghcr.io/${GITHUB_REPOSITORY}"
          echo "Package: ${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}"
