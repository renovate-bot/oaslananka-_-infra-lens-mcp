name: Schema Export Check

on:
  pull_request:
    paths:
      - src/types.ts
      - knip.json
      - .github/workflows/schema-export-check.yml
  push:
    branches: [main]
    paths:
      - src/types.ts
      - knip.json
      - .github/workflows/schema-export-check.yml

permissions:
  contents: read

concurrency:
  group: schema-export-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - name: Validate public schema surface
        run: |
          set -euo pipefail
          test -f src/types.ts
          grep -q "src/types.ts" knip.json
          grep -q "export" src/types.ts
          echo "schema export surface ok"
